<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>射频芯片日报 · 归档</title>
<style>
  :root {
    --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
    --border:#30363d; --text:#e6edf3; --muted:#8b949e;
    --blue:#58a6ff; --green:#3fb950; --purple:#d2a8ff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; font-size:15px; line-height:1.7; min-height:100vh; }

  .header { background:linear-gradient(135deg,#0d1117,#161b22); border-bottom:1px solid var(--border); padding:36px 20px 28px; position:relative; overflow:hidden; text-align:center; }
  .header::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--blue),var(--purple),var(--green)); }
  .header-badge { display:inline-block; background:rgba(88,166,255,.15); border:1px solid rgba(88,166,255,.3); color:var(--blue); font-size:12px; padding:3px 12px; border-radius:20px; margin-bottom:14px; }
  .header h1 { font-size:26px; font-weight:700; margin-bottom:8px; }
  .header p { color:var(--muted); font-size:14px; }

  .container { max-width:680px; margin:0 auto; padding:32px 16px; }

  .section-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .report-list { display:flex; flex-direction:column; gap:10px; }
  .report-item { display:flex; align-items:center; justify-content:space-between; background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px 18px; text-decoration:none; color:var(--text); transition:border-color .2s, background .2s; }
  .report-item:hover { border-color:var(--blue); background:var(--bg3); }
  .report-item-left { display:flex; align-items:center; gap:14px; }
  .report-date-badge { background:rgba(88,166,255,.12); border:1px solid rgba(88,166,255,.25); color:var(--blue); font-size:13px; font-weight:600; padding:6px 12px; border-radius:8px; white-space:nowrap; font-variant-numeric:tabular-nums; }
  .report-info {}
  .report-title { font-size:15px; font-weight:600; margin-bottom:3px; }
  .report-sub { font-size:13px; color:var(--muted); }
  .report-arrow { color:var(--muted); font-size:18px; flex-shrink:0; }
  .report-item:hover .report-arrow { color:var(--blue); }

  .empty { text-align:center; color:var(--muted); padding:48px 0; font-size:14px; }

  .footer { text-align:center; padding:32px 20px; color:var(--muted); font-size:12px; border-top:1px solid var(--border); margin-top:16px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">📡 射频芯片领域动态</div>
  <h1>射频芯片日报</h1>
  <p>每日自动更新 · WorkBuddy 智能调研</p>
</div>

<div class="container">
  <div class="section-label">📋 历史报告</div>
  <div class="report-list">

    <a class="report-item" href="2026-03-14.html">
      <div class="report-item-left">
        <div class="report-date-badge">2026-03-14</div>
        <div class="report-info">
          <div class="report-title">射频芯片日报 · 2026-03-14</div>
          <div class="report-sub">高通X105 · 北大6G全频段芯片 · 太赫兹4.8Tbps · 国产替代</div>
        </div>
      </div>
      <div class="report-arrow">›</div>
    </a>

  </div>
</div>

<div class="footer">
  <p>由 <strong>WorkBuddy</strong> 每日自动生成 &nbsp;·&nbsp; 每天 08:00 更新</p>
</div>

</body>
</html>
